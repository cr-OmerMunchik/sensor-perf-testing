# =============================================================================
# Telegraf Configuration - ActiveProbe Sensor Performance Testing
# =============================================================================
#
# BEFORE DEPLOYING: You must change 3 things:
#   1. INFLUXDB_TOKEN  -> Your InfluxDB API token (from MON VM setup)
#   2. MON_VM_IP       -> IP address of your MON VM (e.g., 172.46.16.24)
#   3. [global_tags]   -> Adjust per VM and per test scenario
#
# =============================================================================

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false

# =============================================================================
# TAGS -- CHANGE THESE PER VM AND PER TEST SCENARIO
# =============================================================================
[global_tags]
  scenario = "idle_baseline"
  sensor_installed = "no"
  sensor_version = ""
  machine_profile = "large_8vcpu_16gb"
  os_version = "win11_26200"
  num_cores = "8"

# =============================================================================
# OUTPUT -- Send metrics to InfluxDB on MON VM
# =============================================================================
[[outputs.influxdb_v2]]
  urls = ["http://MON_VM_IP:8086"]
  token = "INFLUXDB_TOKEN"
  organization = "activeprobe-perf"
  bucket = "telegraf"

# =============================================================================
# SENSOR PER-PROCESS METRICS
# =============================================================================
# Tracks CPU, memory, handles, threads, and I/O for each sensor process.
# If a listed process is not running, Telegraf silently skips it (no error).
[[inputs.win_perf_counters.object]]
  ObjectName = "Process"
  Counters = [
    "% Processor Time",
    "% Privileged Time",
    "Working Set",
    "Working Set - Private",
    "Private Bytes",
    "Virtual Bytes",
    "Handle Count",
    "Thread Count",
    "IO Read Bytes/sec",
    "IO Write Bytes/sec",
    "IO Read Operations/sec",
    "IO Write Operations/sec",
    "Page Faults/sec"
  ]
  Instances = [
    "ActiveConsole",
    "minionhost",
    "CrsSvc",
    "PylumLoader",
    "AmSvc",
    "WscIfSvc",
    "ExecutionPreventionSvc",
    "ActiveCLIAgent",
    "CrAmTray",
    "Nnx",
    "CrEX3",
    "CybereasonAV",
    "CrDrvCtrl",
    "CrScanTool"
  ]
  Measurement = "sensor_process"
  IncludeTotal = false

# =============================================================================
# SYSTEM-WIDE CPU (aggregate)
# =============================================================================
[[inputs.win_perf_counters.object]]
  ObjectName = "Processor"
  Counters = [
    "% Processor Time",
    "% User Time",
    "% Privileged Time",
    "% Interrupt Time",
    "% DPC Time",
    "% Idle Time"
  ]
  Instances = ["_Total"]
  Measurement = "win_cpu"

# =============================================================================
# PER-CORE CPU (useful for detecting single-core spikes)
# =============================================================================
[[inputs.win_perf_counters.object]]
  ObjectName = "Processor"
  Counters = ["% Processor Time", "% Privileged Time"]
  Instances = ["*"]
  Measurement = "win_cpu_per_core"

# =============================================================================
# SYSTEM-WIDE MEMORY
# =============================================================================
[[inputs.win_perf_counters.object]]
  ObjectName = "Memory"
  Counters = [
    "Available MBytes",
    "Committed Bytes",
    "Commit Limit",
    "Pages/sec",
    "Page Reads/sec",
    "Page Writes/sec",
    "Pool Paged Bytes",
    "Pool Nonpaged Bytes",
    "Cache Bytes"
  ]
  Instances = ["------"]
  Measurement = "win_mem"

# =============================================================================
# PHYSICAL DISK I/O
# =============================================================================
[[inputs.win_perf_counters.object]]
  ObjectName = "PhysicalDisk"
  Counters = [
    "Disk Reads/sec",
    "Disk Writes/sec",
    "Disk Read Bytes/sec",
    "Disk Write Bytes/sec",
    "% Disk Time",
    "Current Disk Queue Length",
    "Avg. Disk sec/Read",
    "Avg. Disk sec/Write"
  ]
  Instances = ["_Total"]
  Measurement = "win_disk"

# =============================================================================
# LOGICAL DISK (free space monitoring)
# =============================================================================
[[inputs.win_perf_counters.object]]
  ObjectName = "LogicalDisk"
  Counters = ["% Free Space", "Free Megabytes"]
  Instances = ["C:"]
  Measurement = "win_logical_disk"

# =============================================================================
# NETWORK INTERFACE
# =============================================================================
[[inputs.win_perf_counters.object]]
  ObjectName = "Network Interface"
  Counters = [
    "Bytes Received/sec",
    "Bytes Sent/sec",
    "Packets Received/sec",
    "Packets Sent/sec",
    "Packets Received Errors",
    "Packets Outbound Errors",
    "Output Queue Length"
  ]
  Instances = ["*"]
  Measurement = "win_net"

# =============================================================================
# SYSTEM OVERVIEW
# =============================================================================
[[inputs.win_perf_counters.object]]
  ObjectName = "System"
  Counters = [
    "Processor Queue Length",
    "Context Switches/sec",
    "Processes",
    "Threads"
  ]
  Instances = ["------"]
  Measurement = "win_system"

# =============================================================================
# SENSOR WINDOWS SERVICES STATUS
# =============================================================================
# Monitors whether each sensor service is running, stopped, etc.
# state: 1=stopped, 2=start_pending, 3=stop_pending, 4=running, 7=paused
[[inputs.win_services]]
  service_names = [
    "CybereasonActiveProbe",
    "CybereasonAntiMalware",
    "CybereasonWscIf",
    "CybereasonTI",
    "CybereasonCRS",
    "CybereasonNnx",
    "CybereasonBlocki"
  ]
